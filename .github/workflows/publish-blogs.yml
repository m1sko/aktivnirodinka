name: Automatické publikování blogů

on:
  schedule:
    # Každý 1. a 15. v mesiaci o 8:00 ráno (UTC+1 = 9:00 CZ)
    - cron: '0 7 1 * *'
    - cron: '0 7 15 * *'
  workflow_dispatch:

jobs:
  publish-scheduled-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Git identity
        run: |
          git config user.name "Aktivní Rodinka Bot"
          git config user.email "ahoj@aktivnirodinka.cz"

      - name: Zkontrolovat a publikovat drafty + aktualizovat sitemap
        run: |
          python3 - <<'EOF'
          import os
          import re
          import shutil
          from datetime import date

          today = date.today().isoformat()
          print(f"Dnešní datum: {today}")

          # Publikovanie drafts
          drafts_dir = "blog/drafts"
          if os.path.exists(drafts_dir):
              for filename in os.listdir(drafts_dir):
                  if not filename.endswith(".html"):
                      continue
                  filepath = os.path.join(drafts_dir, filename)
                  with open(filepath, "r") as f:
                      content = f.read()
                  match = re.search(r'<!-- publish: (\d{4}-\d{2}-\d{2}) -->', content)
                  if match:
                      publish_date = match.group(1)
                      if publish_date <= today:
                          dest = os.path.join("blog", filename)
                          shutil.copy(filepath, dest)
                          print(f"✅ Publikováno: {filename} (datum: {publish_date})")

          # Generovanie sitemap
          base_url = "https://www.aktivnirodinka.cz"

          urls = [
              {"loc": f"{base_url}/", "priority": "1.0", "changefreq": "monthly"},
          ]

          skip_root = {"index.html", "404.html"}
          for f in sorted(os.listdir(".")):
              if f.endswith(".html") and f not in skip_root:
                  slug = f.replace(".html", "")
                  urls.append({"loc": f"{base_url}/{slug}", "priority": "0.9", "changefreq": "monthly"})

          urls.append({"loc": f"{base_url}/blog", "priority": "0.8", "changefreq": "weekly"})

          blog_dir = "blog"
          if os.path.exists(blog_dir):
              for f in sorted(os.listdir(blog_dir)):
                  if f.endswith(".html") and f != "index.html":
                      slug = f.replace(".html", "")
                      urls.append({"loc": f"{base_url}/blog/{slug}", "priority": "0.7", "changefreq": "yearly"})

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for u in urls:
              xml += f'  <url>\n'
              xml += f'    <loc>{u["loc"]}</loc>\n'
              xml += f'    <lastmod>{today}</lastmod>\n'
              xml += f'    <changefreq>{u["changefreq"]}</changefreq>\n'
              xml += f'    <priority>{u["priority"]}</priority>\n'
              xml += f'  </url>\n'
          xml += '</urlset>\n'

          with open("sitemap.xml", "w") as f:
              f.write(xml)
          print("✅ Sitemap aktualizována")
          EOF

      - name: Commit a push zmien
        run: |
          git add sitemap.xml blog/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Žiadne zmeny na publikovanie."
          else
            git commit -m "auto: publikování blogů $(date +%Y-%m-%d)"
            git push
            echo "✅ Zmeny pushnuté"
          fi
